<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 OC 抽卡包 (疊卡特效版)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>✨ OC 角色抽卡系統 ✨</h1>

        <div class="stage">
            
            <div id="card-pack" class="pack-container" onclick="openPack()">
                <div class="pack-cap">
                    <div class="jagged-top"></div>
                    <div class="cap-body">✂ 撕開此處</div>
                </div>
                <div class="pack-base">
                    <div class="base-body">
                        OC 卡包<br>
                        <span style="font-size: 14px; font-weight: normal;">內含 5 張卡片</span>
                    </div>
                    <div class="jagged-bottom"></div>
                </div>
            </div>

            <div id="result-display" class="hidden">
                <p class="hint-text">左右滑動或使用 ＜ ＞ 翻頁</p>
                
                <div class="carousel-container">
                    <button id="btn-prev" class="nav-btn" onclick="prevCard()">＜</button>
                    
                    <div id="deck-container">
                        </div>

                    <button id="btn-next" class="nav-btn" onclick="nextCard()">＞</button>
                </div>
                
                <button class="btn-main" onclick="resetPack()">返回卡包頁面</button>
            </div>
        </div>

        <hr>

        <div class="collection-header">
            <h2>角色圖鑑 (<span id="collected-count">0</span> / <span id="total-count">50</span>)</h2>
            <div class="system-buttons">
                <button onclick="downloadSave()" class="btn-sys download">📥 下載存檔</button>
                <button onclick="clearSave()" class="btn-sys danger">🗑 刪除存檔</button>
            </div>
        </div>
        
        <div id="collection-grid" class="grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
